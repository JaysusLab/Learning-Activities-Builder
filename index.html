<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rise Activity Builder</title>

<!-- Styles -->
<link rel="stylesheet" href="css/styles.css">

<!-- JSZip (CDN) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

<!-- ══════════════════════════════════════════
     Top Bar
══════════════════════════════════════════ -->
<header class="topbar">
  <div class="topbar-brand">
    <span class="dot"></span>
    Rise Activity Builder
  </div>
  <div class="topbar-actions">
    <div class="tab-actions active" id="actions-steps">
      <button class="btn btn-secondary" onclick="downloadStepsJSON()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v8m0 0-3-3m3 3 3-3M2 12v1a1 1 0 001 1h10a1 1 0 001-1v-1"/></svg>
        Download JSON
      </button>
      <button class="btn btn-secondary" onclick="downloadStepsHTML()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v8m0 0-3-3m3 3 3-3M2 12v1a1 1 0 001 1h10a1 1 0 001-1v-1"/></svg>
        Download index.html
      </button>
      <button class="btn btn-primary" onclick="downloadStepsZIP()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v8m0 0-3-3m3 3 3-3M2 12v1a1 1 0 001 1h10a1 1 0 001-1v-1"/></svg>
        Download ZIP
      </button>
    </div>
    <div class="tab-actions" id="actions-cards">
      <button class="btn btn-secondary" onclick="downloadCardsJSON()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v8m0 0-3-3m3 3 3-3M2 12v1a1 1 0 001 1h10a1 1 0 001-1v-1"/></svg>
        Download JSON
      </button>
      <button class="btn btn-secondary" onclick="downloadCardsHTML()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v8m0 0-3-3m3 3 3-3M2 12v1a1 1 0 001 1h10a1 1 0 001-1v-1"/></svg>
        Download index.html
      </button>
      <button class="btn btn-primary" onclick="downloadCardsZIP()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v8m0 0-3-3m3 3 3-3M2 12v1a1 1 0 001 1h10a1 1 0 001-1v-1"/></svg>
        Download ZIP
      </button>
    </div>
  </div>
</header>

<!-- ══════════════════════════════════════════
     Tab Bar
══════════════════════════════════════════ -->
<nav class="tab-bar">
  <button class="tab-btn active" id="tab-steps" onclick="switchTab('steps')">Use Case</button>
  <button class="tab-btn" id="tab-cards" onclick="switchTab('cards')">Card Interaction</button>
</nav>

<!-- ══════════════════════════════════════════
     TAB 1 — Use Case w Steps
══════════════════════════════════════════ -->
<div class="tab-panel active" id="panel-steps">
  <div class="workspace">
    <section class="preview-panel">
      <div class="preview-toolbar">
        <span class="preview-label">Live preview</span>
      </div>
      <div class="preview-frame-wrap">
        <div class="preview-viewport" id="stepsPreview"></div>
      </div>
    </section>

    <aside class="editor-panel">
      <div class="editor-scroll">

        <div style="padding:16px 24px;border-bottom:1px solid var(--surface-border)">
          <div class="field" style="margin-bottom:0">
            <label style="font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted)">Activity title</label>
            <input type="text" id="s_activityTitle" value="Configure Workforce Planning Workflow Import" oninput="refreshSteps()">
          </div>
        </div>

        <div style="display:flex;border-bottom:1px solid var(--surface-border)">
          <div style="padding:14px 24px;flex:1">
            <p style="font-family:var(--mono);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:12px">Activity Properties</p>
            <div style="display:flex;flex-direction:column;gap:12px">
              <label class="toggle-row">
                <div class="toggle-switch">
                  <input type="checkbox" id="s_charToggle" onchange="toggleActivitySections()">
                  <div class="toggle-track"></div>
                </div>
                <span>Insert Character Portrait</span>
              </label>
              <label class="toggle-row">
                <div class="toggle-switch">
                  <input type="checkbox" id="s_introToggle" onchange="toggleActivitySections()">
                  <div class="toggle-track"></div>
                </div>
                <span>Insert Introduction Slide</span>
              </label>
              <label class="toggle-row">
                <div class="toggle-switch">
                  <input type="checkbox" id="s_stepsToggle" onchange="toggleActivitySections()" checked>
                  <div class="toggle-track"></div>
                </div>
                <span>Include Steps</span>
              </label>
            </div>
          </div>
          <div style="width:1px;background:var(--surface-border);margin:14px 0;flex-shrink:0"></div>
          <div style="padding:14px 24px">
            <p style="font-family:var(--mono);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:12px">Theme</p>
            <div style="display:flex;gap:10px;align-items:center;margin-bottom:14px">
              <button class="theme-swatch selected" id="s-swatch-blue"   onclick="selectStepsTheme('blue')"   style="background:#5564FF" title="Blue"></button>
              <button class="theme-swatch"           id="s-swatch-pink"   onclick="selectStepsTheme('pink')"   style="background:#FF8FB3" title="Pink"></button>
              <button class="theme-swatch"           id="s-swatch-green"  onclick="selectStepsTheme('green')"  style="background:#00985B" title="Green"></button>
              <button class="theme-swatch"           id="s-swatch-yellow" onclick="selectStepsTheme('yellow')" style="background:#FFCB11" title="Yellow"></button>
            </div>
            <p style="font-family:var(--mono);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:10px">Background</p>
            <div style="display:flex;gap:10px;align-items:center">
              <button class="theme-swatch selected" id="s-bg-1" data-color="#EBEBEB" onclick="selectStepsBg('#EBEBEB')" style="background:#EBEBEB;border:1px solid var(--surface-border)" title="Light"></button>
              <button class="theme-swatch"          id="s-bg-2" data-color="#D4D4D4" onclick="selectStepsBg('#D4D4D4')" style="background:#D4D4D4;border:1px solid var(--surface-border)" title="Mid"></button>
              <button class="theme-swatch"          id="s-bg-3" data-color="#9E9E9E" onclick="selectStepsBg('#9E9E9E')" style="background:#9E9E9E;border:1px solid var(--surface-border)" title="Dark"></button>
              <input type="text" id="s_bgCustom" placeholder="#000000" maxlength="7" oninput="applyCustomBg(this.value)" style="width:74px;font-family:var(--mono);font-size:11px;padding:3px 7px;border:1px solid var(--surface-border);border-radius:4px;color:var(--text-primary);background:var(--surface-bg)">
            </div>
          </div>
        </div>

        <div id="s-char-section" style="display:none;border-bottom:1px solid var(--surface-border)">
          <div class="accordion open" id="s-acc-character">
            <button class="accordion-trigger" onclick="toggleAccordion('s-acc-character')">
              <div class="accordion-trigger-left"><span class="accordion-title">Character</span></div>
              <svg class="accordion-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6l4 4 4-4"/></svg>
            </button>
            <div class="accordion-body">
              <div class="field">
                <label>Image Filename <span style="color:var(--text-muted);font-weight:400">(optional — place in same folder)</span></label>
                <input type="text" id="s_charImage" value="Lisa-Admin.jpg" placeholder="e.g. portrait.jpg" oninput="refreshSteps()">
              </div>
              <div class="field-row">
                <div class="field"><label>Alt text</label><input type="text" id="s_charAlt" value="Portrait of Lisa, a OneStream Administrator" oninput="refreshSteps()"></div>
                <div class="field"><label>Placeholder text</label><input type="text" id="s_charPlaceholder" value="Character Portrait" oninput="refreshSteps()"></div>
              </div>
            </div>
          </div>
        </div>

        <div id="s-intro-section" style="display:none;border-bottom:1px solid var(--surface-border)">
          <div class="accordion open" id="s-acc-intro">
            <button class="accordion-trigger" onclick="toggleAccordion('s-acc-intro')">
              <div class="accordion-trigger-left"><span class="accordion-title">Introduction slide</span></div>
              <svg class="accordion-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6l4 4 4-4"/></svg>
            </button>
            <div class="accordion-body">
              <div class="field">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
                  <label style="margin-bottom:0">Slide title</label>
                  <label class="toggle-switch">
                    <input type="checkbox" id="s_introTitleToggle" onchange="toggleIntroTitle()" checked>
                    <div class="toggle-track"></div>
                  </label>
                </div>
                <input type="text" id="s_introTitle" value="Workforce Planning Data Import Setup" oninput="refreshSteps()">
              </div>
              <div class="field">
                <label>Content</label>
                <textarea id="s_introContent" oninput="refreshSteps()">The OneStream Administrator, Lisa, at GolfStream is tasked with setting up workflows in the application. The Workforce Planning department in North America needs to upload workforce planning data to a Cube within the system for analysis and reporting purposes. To ensure this is possible, the administrator must configure several components: create a data source linked to a Connector business rule, set up transformation rules, and establish a Workflow Import input that brings all these elements together.</textarea>
              </div>
            </div>
          </div>
        </div>

        <div class="accordion open" id="s-acc-steps">
          <button class="accordion-trigger" onclick="toggleAccordion('s-acc-steps')">
            <div class="accordion-trigger-left">
              <span class="accordion-title">Steps</span>
              <span class="accordion-badge" id="s_stepCountBadge">4 steps</span>
            </div>
            <svg class="accordion-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6l4 4 4-4"/></svg>
          </button>
          <div class="accordion-body">
            <div id="s_stepsContainer"></div>
            <button class="add-step-btn" id="s_addStepBtn" onclick="addStep()">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v10M3 8h10"/></svg>
              Add step
            </button>
            <p class="step-limit-note" id="s_stepLimitNote" style="display:none">Maximum 9 steps reached</p>
          </div>
        </div>

        <div class="accordion" id="s-acc-nav">
          <button class="accordion-trigger" onclick="toggleAccordion('s-acc-nav')">
            <div class="accordion-trigger-left"><span class="accordion-title">Navigation labels</span></div>
            <svg class="accordion-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6l4 4 4-4"/></svg>
          </button>
          <div class="accordion-body">
            <div class="field-row">
              <div class="field"><label>Previous button</label><input type="text" id="s_navPrev" value="Previous" oninput="refreshSteps()"></div>
              <div class="field"><label>Next button</label><input type="text" id="s_navNext" value="Next" oninput="refreshSteps()"></div>
              <div class="field"><label>Complete button</label><input type="text" id="s_navComplete" value="Complete" oninput="refreshSteps()"></div>
              <div class="field"><label>Introduction label</label><input type="text" id="s_navIntro" value="Introduction" oninput="refreshSteps()"></div>
            </div>
          </div>
        </div>

      </div>
    </aside>
  </div>
</div>

<!-- ══════════════════════════════════════════
     TAB 2 — Card Interaction
══════════════════════════════════════════ -->
<div class="tab-panel" id="panel-cards">
  <div class="workspace">
    <section class="preview-panel">
      <div class="preview-toolbar">
        <span class="preview-label">Live preview</span>
      </div>
      <div class="preview-frame-wrap">
        <div class="preview-viewport" id="cardsPreview"></div>
      </div>
    </section>

    <aside class="editor-panel">
      <div class="editor-scroll">

        <div style="padding:16px 24px;border-bottom:1px solid var(--surface-border)">
          <div class="field" style="margin-bottom:0">
            <label style="font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted)">Activity title</label>
            <input type="text" id="c_activityTitle" value="Interactive Learning Component" oninput="refreshCards()">
          </div>
        </div>

        <div class="accordion open" id="c-acc-bubble">
          <button class="accordion-trigger" onclick="toggleAccordion('c-acc-bubble')">
            <div class="accordion-trigger-left"><span class="accordion-title">Speech bubble</span></div>
            <svg class="accordion-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6l4 4 4-4"/></svg>
          </button>
          <div class="accordion-body">
            <div class="field">
              <label>Speech bubble text</label>
              <input type="text" id="c_bubbleText" value="Click on the cards to learn more" oninput="refreshCards()">
            </div>
            <div class="field">
              <label>Auto-hide timeout (ms)</label>
              <input type="number" id="c_bubbleTimeout" value="8000" min="1000" max="30000" step="500" oninput="refreshCards()">
            </div>
          </div>
        </div>

        <div class="accordion open" id="c-acc-cards">
          <button class="accordion-trigger" onclick="toggleAccordion('c-acc-cards')">
            <div class="accordion-trigger-left">
              <span class="accordion-title">Cards</span>
              <span class="accordion-badge" id="c_cardCountBadge">4 cards</span>
            </div>
            <svg class="accordion-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6l4 4 4-4"/></svg>
          </button>
          <div class="accordion-body">
            <div id="c_cardsContainer"></div>
            <button class="add-step-btn" id="c_addCardBtn" onclick="addCard()">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v10M3 8h10"/></svg>
              Add card
            </button>
            <p class="step-limit-note" id="c_cardLimitNote" style="display:none">Maximum 9 cards reached</p>
          </div>
        </div>

      </div>
    </aside>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 4.5L6.5 11 3 7.5"/></svg>
  <span id="toastMsg">Downloaded!</span>
</div>

<!-- ══════════════════════════════════════════
     Scripts — load order matters
     1. Utilities (shared helpers, tab switching)
     2. Templates (HTML builders for exported files)
     3. Editor modules (data, preview, downloads)
     4. Init (bootstrap on page load)
══════════════════════════════════════════ -->
<script src="js/utils.js"></script>
<script src="templates/steps-template.js"></script>
<script src="templates/cards-template.js"></script>
<script src="js/steps-editor.js"></script>
<script src="js/cards-editor.js"></script>
<script src="js/init.js"></script>

</body>
</html>
